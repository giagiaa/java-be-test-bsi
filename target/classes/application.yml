spring:
  application:
    name: concert-booking

  datasource:
    url: jdbc:postgresql://localhost:5434/concert_booking?stringtype=unspecified



    username: concert_user
    password: concert_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  rabbitmq:
    host: localhost
    port: 5672
    username: rabbit_user
    password: rabbit_pass
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0

  cache:
    type: redis
    redis:
      time-to-live: 60000

  security:
    require-ssl: false

server:
  port: 8081

  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json
  tomcat:
    threads:
      max: 400
      min-spare: 50
    accept-count: 100
    max-connections: 10000

app:
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  rate-limit:
    capacity: 100
    refill-duration-minutes: 1

  booking:
    lock-duration-minutes: 5

  rabbitmq:
    exchange: booking.exchange
    routing:
      paid: booking.paid
      expired: booking.expired
      cancelled: booking.cancelled
    queue:
      paid: booking.paid.queue
      expired: booking.expired.queue
      cancelled: booking.cancelled.queue

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    rabbit:
      enabled: true

logging:
  level:
    com.concertbooking: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16:///concert_booking_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  flyway:
    enabled: true

  rabbitmq:
    host: localhost

  data:
    redis:
      host: localhost
      port: 6380
